🔹 What is Map in JavaScript?

A Map is a built-in object that stores data as key-value pairs.

Unlike a normal object ({}):

✅ Keys can be any data type (string, number, object, function, etc.).
✅ Keys are stored in the same order in which they were inserted.
✅ It provides built-in methods like set(), get(), has(), and delete().
✅ Simple Example 

👉 Store a student's marks

let studentMarks = new Map();

studentMarks.set("Math", 95);
studentMarks.set("Science", 90);
studentMarks.set("English", 88);

console.log(studentMarks);
🟢 Output
Map(3) {
  'Math' => 95,
  'Science' => 90,
  'English' => 88
}
🔹 Getting a value using the key
console.log(studentMarks.get("Science"));
🟢 Output
90
🔹 Checking whether a key exists
console.log(studentMarks.has("Math"));
console.log(studentMarks.has("History"));
🟢 Output
true
false
🔹 Updating a value
studentMarks.set("Math", 99);

console.log(studentMarks);
🟢 Output
Map(3) {
  'Math' => 99,
  'Science' => 90,
  'English' => 88
}

If the key already exists, set() updates the value.

🔹 Deleting a key
studentMarks.delete("English");

console.log(studentMarks);
🟢 Output
Map(2) {
  'Math' => 99,
  'Science' => 90
}
🔹 Finding the size of a Map
console.log(studentMarks.size);
🟢 Output
2
🔹 Looping through a Map
for (let [subject, marks] of studentMarks) {
    console.log(subject, marks);
}
🟢 Output
Math 99
Science 90
🔹 Creating a Map directly
let employee = new Map([
    ["Name", "Ravi"],
    ["Age", 25],
    ["City", "Chennai"]
]);

console.log(employee);
🟢 Output
Map(3) {
  'Name' => 'Ravi',
  'Age' => 25,
  'City' => 'Chennai'
}
🔹 Why use Map instead of Object?
let user = new Map();

user.set(101, "Ravi");
user.set(true, "Admin");
user.set({ id: 1 }, "Object Key");

console.log(user);

A Map allows keys of any data type, while object keys are typically strings (or symbols).

| **Set**                       | **Map**                                         |
| ----------------------------- | ----------------------------------------------- |
| Stores only **unique values** | Stores **key-value pairs**                      |
| No duplicate values           | Keys are unique; values can be duplicated       |
| `add()`                       | `set()`                                         |
| `has()`                       | `has()`                                         |
| `delete()`                    | `delete()`                                      |
| `size`                        | `size`                                          |
| Best for removing duplicates  | Best for storing and retrieving data using keys |
