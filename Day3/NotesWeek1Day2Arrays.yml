Difference between slice() and splice()

slice(start, endIndex)
arr.slice(1, 4)


Means:

Start at index 1, stop before index 4

splice(start, deleteCount)
arr.splice(1, 3)


Means:

Start at index 1, remove 3 elements

So:

["a","b","c","d","e"]
     ↑ start=1

remove 3 → b, c, d


Remaining array:

["a","e"]

Side-by-side
Method	Second argument means
slice(1,4)	Stop at index 4 (exclusive)
splice(1,3)	Remove 3 elements

 Interview line

“slice() uses start and end index, but splice() uses start index and delete count.”

--------------------------------------------------------------------------------------------------------------------
let arrayLetters = ["a","b","c","d","e"] // => [0,1,2,3,4]

The syntax of `splice()` is:

  
array.splice(startIndex, deleteCount, item1, item2, ...)
```

The **second parameter is always `deleteCount`**.

In your code:

  
arrayLetters.splice(1, "x", "y", "z");
```

JavaScript interprets it as:

  
startIndex = 1
deleteCount = "x"
itemsToInsert = "y", "z"
```

Notice that `"x"` is **not** inserted. It is treated as the `deleteCount`.

### Why did `"x"` disappear?

`deleteCount` should be a number, but you passed a string.

JavaScript converts `"x"` to a number:

  
Number("x") // NaN
```

When `deleteCount` becomes `NaN`, `splice()` treats it as **0**.

So your code is effectively:

  
arrayLetters.splice(1, 0, "y", "z");
```

If:


let arrayLetters = ["a", "b", "c", "d", "e"];
```

The result is:

  
[
  "a",
  "y",
  "z",
  "b",
  "c",
  "d",
  "e"
]
```

*******************************************************************************************************************************************************

## What if you really omit the `deleteCount`?


let arrayLetters = ["a", "b", "c", "d", "e"];

arrayLetters.splice(1);

console.log(arrayLetters);
```

### Output


["a"]
```

Why?

When **only one argument** is passed:


array.splice(startIndex)
```

JavaScript deletes **everything from `startIndex` to the end of the array**.

So this is equivalent to:

arrayLetters.splice(1, arrayLetters.length - 1);
```

---

## Examples

let arr = ["a", "b", "c", "d", "e"];

arr.splice(2);
console.log(arr);
```

Output:


["a", "b"]
```

---


let arr = ["a", "b", "c", "d", "e"];

arr.splice(2, 0, "x");
console.log(arr);
```

Output:


["a", "b", "x", "c", "d", "e"]
```

(No elements deleted.)

---


let arr = ["a", "b", "c", "d", "e"];

arr.splice(2, 2, "x");
console.log(arr);
```

Output:

  
["a", "b", "x", "e"]
```

(Deletes `"c"` and `"d"`, then inserts `"x"`.)

---

### Interview Tip

Remember these three cases:

* `splice(start)` → Deletes **everything from `start` to the end**.
* `splice(start, 0, items...)` → **Inserts** items without deleting anything.
* `splice(start, n, items...)` → Deletes `n` elements and then inserts the new items.

Your code:

  
arrayLetters.splice(1, "x", "y", "z");
```

does **not** omit `deleteCount`; it passes `"x"` as the `deleteCount`, which becomes `0`, so only `"y"` and `"z"` are inserted.


