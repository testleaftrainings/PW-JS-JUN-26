substring()

Difference between one and two arguments
let str = "Playwright";

console.log(str.substring(4));    // "wright"
console.log(str.substring(4, 7)); // "wri"
substring(4) → From index 4 to the end.
substring(4, 7) → From index 4 up to but not including index 7.



