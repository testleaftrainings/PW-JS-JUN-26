Difference between Playwright and latest Selenium Version 4.6+

| Playwright                                   | Selenium Manager                                   |
| -------------------------------------------- | -------------------------------------------------- |
| Installs browsers if required                | Uses the browser already installed on your machine |
| Downloads browser binaries                   | Downloads only the browser driver                  |
| Manages browser versions                     | Manages only the driver version                    |
| `npx playwright install` installs browsers   | Browser must already exist (in most cases)         |
| Browser and framework are tightly integrated | Browser and Selenium are separate                  |

