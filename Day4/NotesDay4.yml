/// <reference types="node" /> tells TypeScript to include Node.js type definitions so things like process are recognized.

🔹 Why you are getting error without it

In your config, you’re using:

process.env.CI

👉 process is a Node.js global, not a browser/JS standard.

TypeScript doesn’t automatically know about Node globals unless you tell it.

So without this line:

/// <reference types="node" />

TypeScript thinks:
❌ Cannot find name 'process'

🔹 What this line actually does

It pulls in types from:

@types/node

Which defines things like:

process
__dirname
Buffer
fs, path, etc.


